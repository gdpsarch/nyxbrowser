<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Editor</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    
    <style>
        :root {
            --bg-body: #ffffff;
            --bg-sidebar: #f8f9fa;
            --border: #e1e4e8;
            --text-main: #24292e;
            --code-font: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            color: var(--text-main);
        }

        header {
            padding: 16px 32px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.5px;
        }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        textarea {
            width: 100%;
            height: 100%;
            padding: 24px;
            border: none;
            border-right: 1px solid var(--border);
            outline: none;
            resize: none;
            background: var(--bg-sidebar);
            font-family: var(--code-font);
            font-size: 14px;
            line-height: 1.6;
            box-sizing: border-box;
        }

        .preview {
            padding: 24px;
            overflow-y: auto;
            line-height: 1.6;
        }

        /* Стилізація контенту прев'ю */
        .preview h1, .preview h2 { border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        .preview code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 6px; font-family: var(--code-font); }
        .preview pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow: auto; }
        .preview blockquote { border-left: 4px solid var(--border); color: #6a737d; padding-left: 16px; margin: 0; }
    </style>
</head>
<body>

    <header>MARKDOWN.COM</header>
    <main>
        <div class="pane">
            <textarea id="editor" placeholder="Write your markdown here..."></textarea>
        </div>
        <div class="pane">
            <div id="preview" class="preview"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');

        editor.addEventListener('input', (e) => {
            preview.innerHTML = marked.parse(e.target.value);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyx Registry</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0D12;--s1:#13151C;--s2:#1A1C24;--s3:#21232E;--s4:#292B38;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --text:#D0D2DC;--dim:#5C5F73;--dim2:#8D90A4;
  --acc:#6C8EFF;--acc2:#A78BFA;--acc3:#34D399;--red:#F87171;--yellow:#FBBF24;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column}
svg{display:block;flex-shrink:0}

.topbar{height:54px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;gap:16px;flex-shrink:0;box-shadow:0 2px 20px rgba(0,0,0,.4)}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;letter-spacing:-.5px}
.logo-ico{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center}
.logo span{color:var(--acc)}
.search-bar{flex:1;max-width:400px;height:34px;background:var(--bg);border:1.5px solid var(--border2);border-radius:17px;display:flex;align-items:center;padding:0 14px;gap:8px;transition:border-color .2s}
.search-bar:focus-within{border-color:var(--acc)}
.search-bar input{flex:1;border:none;background:none;font-family:var(--font);font-size:13px;color:var(--text);outline:none}
.search-bar input::placeholder{color:var(--dim)}
.tb-actions{margin-left:auto;display:flex;gap:8px}
.btn{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
.btn-ghost{background:var(--s3);color:var(--dim2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--s4);color:var(--text)}
.btn-acc{background:var(--acc);color:#fff}
.btn-acc:hover{opacity:.85;transform:translateY(-1px)}

.content{flex:1;padding:32px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:20px;transition:border-color .2s}
.stat-card:hover{border-color:var(--border2)}
.stat-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.stat-val{font-size:32px;font-weight:700;letter-spacing:-1px;color:var(--text)}
.stat-sub{font-size:12px;color:var(--dim);margin-top:4px}
.stat-ico{margin-bottom:12px;color:var(--acc);opacity:.6}

.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:14px;font-weight:600;letter-spacing:.2px}
.section-sub{font-size:12px;color:var(--dim);margin-top:2px}
.view-btns{display:flex;gap:2px}
.view-btn{width:30px;height:30px;border:1px solid var(--border2);background:none;cursor:pointer;color:var(--dim);border-radius:7px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.view-btn.active{background:var(--s3);color:var(--text)}

.domains-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.domain-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:18px;transition:background var(--t),border-color var(--t),transform .15s,box-shadow .15s;animation:fadeUp .2s ease both;cursor:pointer}
.domain-card:hover{background:var(--s2);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.dc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.dc-domain{font-size:14px;font-weight:600;font-family:var(--mono);color:var(--acc)}
.dc-badge{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:10px}
.dc-badge.virtual{background:rgba(108,142,255,.15);color:var(--acc)}
.dc-badge.file{background:rgba(52,211,153,.12);color:var(--acc3)}
.dc-badge.blocked{background:rgba(248,113,113,.12);color:var(--red)}
.dc-meta{font-size:12px;color:var(--dim);line-height:1.6}
.dc-actions{display:flex;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.dc-btn{flex:1;padding:7px;border:none;background:var(--s3);cursor:pointer;border-radius:7px;font-family:var(--font);font-size:12px;font-weight:500;color:var(--dim2);transition:background .15s,color .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.dc-btn:hover{background:var(--s4);color:var(--text)}
.dc-btn.del:hover{background:rgba(248,113,113,.12);color:var(--red)}

.domains-list{display:flex;flex-direction:column;gap:4px}
.domain-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--s1);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:background .15s,border-color .15s;animation:fadeUp .15s ease both}
.domain-row:hover{background:var(--s2);border-color:var(--border2)}
.dr-ico{color:var(--dim2);flex-shrink:0}
.dr-domain{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--acc);min-width:180px}
.dr-type{font-size:11px;color:var(--dim);min-width:70px}
.dr-date{font-size:11px;color:var(--dim);flex:1}
.dr-actions{display:flex;gap:4px}
.dr-btn{width:28px;height:28px;border:none;background:none;cursor:pointer;color:var(--dim);border-radius:6px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.dr-btn:hover{background:var(--s4);color:var(--text)}
.dr-btn.del:hover{background:rgba(248,113,113,.12);color:var(--red)}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;color:var(--dim);text-align:center}
.empty-state p{font-size:13px;line-height:1.7;max-width:320px}

.filter-row{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:none;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;color:var(--dim2);transition:all .15s}
.filter-btn.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.filter-btn:hover:not(.active){background:var(--s3);color:var(--text)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-ico">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    </div>
    Nyx <span>Registry</span>
  </div>
  <div class="search-bar">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--dim)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" type="text" placeholder="Search domains...">
  </div>
  <div class="tb-actions">
    <button class="btn btn-ghost" id="btn-refresh">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Refresh
    </button>
    <button class="btn btn-acc" id="btn-new">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Site
    </button>
  </div>
</div>

<div class="content">
  <div class="stats-row" id="stats-row"></div>

  <div class="section-head">
    <div>
      <div class="section-title">Registered Domains</div>
      <div class="section-sub" id="domain-count">Loading...</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="view-btns">
        <button class="view-btn active" id="view-grid" title="Grid view">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button class="view-btn" id="view-list" title="List view">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="filter-row" id="filter-row">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="virtual">Virtual (.nyx)</button>
    <button class="filter-btn" data-filter="file">File-based</button>
    <button class="filter-btn" data-filter="blocked">Blocked</button>
  </div>

  <div id="domains-container"></div>
</div>

<script>
let allSites = {};
let allHistory = [];
let allBookmarks = [];
let blocklist = [];
let viewMode = 'grid';
let activeFilter = 'all';
let searchQuery = '';

function fmtDate(ts){ return new Date(ts).toLocaleDateString('en',{month:'short',day:'numeric',year:'numeric'}); }
function fmtSize(html){ const b=new Blob([html]).size; if(b<1024) return b+'B'; if(b<1048576) return (b/1024).toFixed(1)+'KB'; return (b/1048576).toFixed(1)+'MB'; }

function isBlocked(host){ return blocklist.some(r=>{ if(r.startsWith('*.')){ return host.endsWith(r.slice(1))||host===r.slice(2); } return host===r||host.endsWith('.'+r); }); }

function renderStats(){
  const virts = Object.keys(allSites).filter(h=>h.endsWith('.nyx')).length;
  const total = Object.keys(allSites).length;
  const blocked = Object.keys(allSites).filter(h=>isBlocked(h)).length;
  const visits = allHistory.length;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card">
      <div class="stat-ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div>
      <div class="stat-label">Total Domains</div>
      <div class="stat-val">${total}</div>
      <div class="stat-sub">in registry</div>
    </div>
    <div class="stat-card">
      <div class="stat-ico" style="color:var(--acc2)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></div>
      <div class="stat-label">Virtual Sites</div>
      <div class="stat-val">${virts}</div>
      <div class="stat-sub">.nyx domains</div>
    </div>
    <div class="stat-card">
      <div class="stat-ico" style="color:var(--red)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
      <div class="stat-label">Blocked</div>
      <div class="stat-val">${blocked}</div>
      <div class="stat-sub">by YYSEC</div>
    </div>
    <div class="stat-card">
      <div class="stat-ico" style="color:var(--acc3)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <div class="stat-label">History Items</div>
      <div class="stat-val">${visits}</div>
      <div class="stat-sub">total visits</div>
    </div>
  `;
}

function getFilteredSites(){
  let entries = Object.entries(allSites);
  if(activeFilter==='virtual') entries=entries.filter(([h])=>h.endsWith('.nyx'));
  if(activeFilter==='file') entries=entries.filter(([h])=>!h.endsWith('.nyx'));
  if(activeFilter==='blocked') entries=entries.filter(([h])=>isBlocked(h));
  if(searchQuery) entries=entries.filter(([h])=>h.toLowerCase().includes(searchQuery.toLowerCase()));
  return entries;
}

function renderDomains(){
  const entries=getFilteredSites();
  const container=document.getElementById('domains-container');
  document.getElementById('domain-count').textContent=entries.length+' domain'+(entries.length!==1?'s':'');

  if(!entries.length){
    container.innerHTML=`<div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="color:var(--dim);opacity:.3"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <div style="font-size:15px;font-weight:600">No domains found</div>
      <p>${searchQuery?'No results for "'+searchQuery+'"':'No sites registered yet. Open builder.nyx to create your first site.'}</p>
    </div>`;
    return;
  }

  if(viewMode==='grid'){
    container.className='domains-grid';
    container.innerHTML=entries.map(([host,data],i)=>{
      const blocked=isBlocked(host);
      const isVirt=host.endsWith('.nyx');
      const date=fmtDate(data.updated||Date.now());
      const size=data.html?fmtSize(data.html):'—';
      return `<div class="domain-card" style="animation-delay:${i*20}ms" data-host="${host}">
        <div class="dc-head">
          <div class="dc-domain">${host}</div>
          <span class="dc-badge ${blocked?'blocked':isVirt?'virtual':'file'}">${blocked?'BLOCKED':isVirt?'VIRTUAL':'FILE'}</span>
        </div>
        <div class="dc-meta">
          Updated: ${date}<br>
          Size: ${size}
        </div>
        <div class="dc-actions">
          <button class="dc-btn visit" data-host="${host}">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Visit
          </button>
          <button class="dc-btn edit" data-host="${host}">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Edit
          </button>
          <button class="dc-btn del" data-host="${host}">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>`;
    }).join('');
  } else {
    container.className='domains-list';
    container.innerHTML=entries.map(([host,data],i)=>{
      const blocked=isBlocked(host);
      const isVirt=host.endsWith('.nyx');
      return `<div class="domain-row" style="animation-delay:${i*10}ms" data-host="${host}">
        <span class="dr-ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span>
        <span class="dr-domain">${host}</span>
        <span class="dr-type">${blocked?'<span style="color:var(--red)">BLOCKED</span>':isVirt?'Virtual':'File'}</span>
        <span class="dr-date">${fmtDate(data.updated||Date.now())}</span>
        <div class="dr-actions">
          <button class="dr-btn visit" data-host="${host}" title="Visit"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>
          <button class="dr-btn edit" data-host="${host}" title="Edit in Builder"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
          <button class="dr-btn del" data-host="${host}" title="Delete"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>
        </div>
      </div>`;
    }).join('');
  }

  document.querySelectorAll('.visit').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); parent.postMessage({source:'nyx_registry',type:'navigate',host:b.dataset.host},'*'); }));
  document.querySelectorAll('.edit').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); parent.postMessage({source:'nyx_registry',type:'navigate',host:'builder.nyx'},'*'); }));
  document.querySelectorAll('.del').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); if(confirm('Delete "'+b.dataset.host+'"?')){ parent.postMessage({source:'nyx_registry',type:'delete_site',host:b.dataset.host},'*'); delete allSites[b.dataset.host]; renderStats(); renderDomains(); }}));
}

function render(){ renderStats(); renderDomains(); }

document.getElementById('btn-refresh').addEventListener('click',()=>parent.postMessage({source:'nyx_registry',type:'get_all'},'*'));
document.getElementById('btn-new').addEventListener('click',()=>parent.postMessage({source:'nyx_registry',type:'navigate',host:'builder.nyx'},'*'));
document.getElementById('view-grid').addEventListener('click',()=>{ viewMode='grid'; document.getElementById('view-grid').classList.add('active'); document.getElementById('view-list').classList.remove('active'); renderDomains(); });
document.getElementById('view-list').addEventListener('click',()=>{ viewMode='list'; document.getElementById('view-list').classList.add('active'); document.getElementById('view-grid').classList.remove('active'); renderDomains(); });

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{ document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); activeFilter=btn.dataset.filter; renderDomains(); });
});

document.getElementById('search-input').addEventListener('input',e=>{ searchQuery=e.target.value; renderDomains(); });

window.addEventListener('message',e=>{
  const d=e.data; if(!d||d.source!=='nyx_browser') return;
  if(d.type==='all_data'){
    allSites=d.sites||{}; allHistory=d.history||[]; allBookmarks=d.bookmarks||[];
    blocklist=d.blocklist||[];
    render();
  }
});

parent.postMessage({source:'nyx_registry',type:'get_all'},'*');
</script>
</body>
</html>

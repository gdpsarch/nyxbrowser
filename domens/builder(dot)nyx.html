<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyx Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0C10;--s1:#13141A;--s2:#1A1C24;--s3:#21232E;--s4:#292B38;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --text:#D0D2DC;--dim:#5C5F73;--dim2:#8D90A4;
  --acc:#6C8EFF;--acc2:#A78BFA;--acc3:#34D399;
  --red:#F87171;--yellow:#FBBF24;--orange:#FB923C;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
  --sidebar:260px;--preview:50%;
}
body{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--bg);font-family:var(--font);color:var(--text)}
svg{display:block;flex-shrink:0}

/* TOP BAR */
.topbar{height:50px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;box-shadow:0 2px 20px rgba(0,0,0,.4)}
.logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;letter-spacing:-.5px;color:var(--text);white-space:nowrap}
.logo-dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));box-shadow:0 0 10px var(--acc)}
.domain-wrap{flex:1;display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border2);border-radius:20px;padding:0 14px;height:34px;max-width:360px;transition:border-color .2s,box-shadow .2s}
.domain-wrap:focus-within{border-color:var(--acc);box-shadow:0 0 0 3px rgba(108,142,255,.12)}
.domain-tld{font-size:12px;color:var(--acc);font-family:var(--mono);white-space:nowrap;opacity:.8}
.domain-input{flex:1;border:none;background:none;font-family:var(--mono);font-size:13px;color:var(--text);outline:none;min-width:0}
.domain-input::placeholder{color:var(--dim);font-family:var(--font)}
.topbar-actions{display:flex;gap:6px;margin-left:auto}
.tb-btn{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
.tb-btn-ghost{background:var(--s3);color:var(--dim2);border:1px solid var(--border2)}
.tb-btn-ghost:hover{background:var(--s4);color:var(--text)}
.tb-btn-acc{background:var(--acc);color:#fff}
.tb-btn-acc:hover{background:#5a7ef0;transform:translateY(-1px);box-shadow:0 4px 16px rgba(108,142,255,.3)}
.tb-btn-green{background:var(--acc3);color:#0B1A14}
.tb-btn-green:hover{background:#2dbf8a;transform:translateY(-1px);box-shadow:0 4px 16px rgba(52,211,153,.3)}

/* MAIN LAYOUT */
.main{flex:1;display:flex;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.stab{flex:1;padding:10px 8px;border:none;background:none;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.stab.active{color:var(--acc);border-bottom-color:var(--acc)}
.sidebar-body{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:var(--s4) transparent}

/* BLOCKS panel */
.block-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px}
.block-item{background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:10px 8px;cursor:pointer;text-align:center;transition:background .15s,border-color .15s,transform .15s;user-select:none}
.block-item:hover{background:var(--s4);border-color:var(--acc);transform:translateY(-2px)}
.block-item:active{transform:translateY(0)}
.block-ico{margin:0 auto 6px;color:var(--dim2)}
.block-label{font-size:11px;font-weight:500;color:var(--dim2)}
.section-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin:14px 0 8px}

/* Properties panel */
.prop-row{margin-bottom:10px}
.prop-label{font-size:11px;font-weight:600;color:var(--dim);margin-bottom:4px;letter-spacing:.3px}
.prop-input{width:100%;background:var(--s3);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:7px 10px;font-family:var(--font);font-size:13px;outline:none;transition:border-color .15s}
.prop-input:focus{border-color:var(--acc)}
.prop-textarea{resize:vertical;min-height:80px;font-family:var(--mono);font-size:12px}
.color-row{display:flex;gap:6px;align-items:center}
.color-swatch{width:26px;height:26px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0}
.color-swatch:hover,.color-swatch.active{transform:scale(1.15);border-color:var(--text)}
.prop-select{width:100%;background:var(--s3);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:7px 10px;font-family:var(--font);font-size:13px;outline:none;cursor:pointer}

/* Sites list */
.site-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:background .15s,border-color .15s;animation:fadeUp .2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.site-card:hover{background:var(--s3);border-color:var(--border2)}
.site-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.site-card-domain{font-size:13px;font-weight:600;color:var(--acc);font-family:var(--mono)}
.site-card-meta{font-size:11px;color:var(--dim)}
.site-card-actions{display:flex;gap:4px}
.sc-btn{width:24px;height:24px;border:none;background:none;cursor:pointer;color:var(--dim);border-radius:5px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.sc-btn:hover{background:var(--s4);color:var(--text)}
.sc-btn.del:hover{background:rgba(248,113,113,.15);color:var(--red)}
.empty-sites{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:10px;color:var(--dim);font-size:13px;text-align:center}

/* CODE EDITOR */
.editor-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.editor-tabs{display:flex;align-items:center;background:var(--s2);border-bottom:1px solid var(--border);padding:0 12px;gap:2px;flex-shrink:0}
.etab{padding:10px 14px;font-size:12px;font-weight:500;cursor:pointer;color:var(--dim2);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
.etab.active{color:var(--text);border-bottom-color:var(--acc)}
.editor-actions{margin-left:auto;display:flex;gap:6px;align-items:center}
.ea-btn{width:28px;height:28px;border:none;background:none;cursor:pointer;color:var(--dim);border-radius:6px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.ea-btn:hover{background:var(--s4);color:var(--text)}
.editor-panes{flex:1;display:flex;overflow:hidden}
.code-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.code-pane.hidden{display:none}
.preview-pane{flex:1;overflow:hidden;display:flex;flex-direction:column}
.preview-pane.hidden{display:none}
.preview-bar{padding:7px 14px;background:var(--s2);border-bottom:1px solid var(--border);font-size:11px;color:var(--dim);display:flex;align-items:center;gap:8px;flex-shrink:0}
.preview-dot{width:6px;height:6px;border-radius:50%;background:var(--acc3)}
.preview-frame{flex:1;border:none;background:#fff}
textarea.code{
  flex:1;width:100%;border:none;background:var(--bg);
  color:#ABB2BF;font-family:var(--mono);font-size:13px;line-height:1.7;
  padding:16px 20px;resize:none;outline:none;tab-size:2;
  scrollbar-width:thin;scrollbar-color:var(--s4) transparent;
}
.line-nums{
  width:42px;background:var(--s1);border-right:1px solid var(--border);
  padding:16px 0;font-family:var(--mono);font-size:13px;line-height:1.7;
  color:var(--dim);text-align:right;padding-right:10px;flex-shrink:0;
  overflow:hidden;user-select:none;
}
.code-row{display:flex;flex:1;overflow:hidden}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--s2);border:1px solid var(--border2);color:var(--text);font-size:13px;font-weight:500;padding:10px 20px;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:999;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success .toast-inner{color:var(--acc3)}
.badge{background:var(--acc);color:#fff;font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}
/* DROP ZONE */
.drop-overlay{position:fixed;inset:0;background:rgba(108,142,255,.12);border:3px dashed var(--acc);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;pointer-events:none;opacity:0;transition:opacity .2s;border-radius:12px;margin:8px}
.drop-overlay.active{opacity:1;pointer-events:all}
.drop-overlay svg{color:var(--acc);animation:bounce .8s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.drop-overlay p{font-size:18px;font-weight:600;color:var(--acc)}
.drop-overlay span{font-size:13px;color:var(--dim2)}
/* IMPORT MODAL */
.import-modal{background:var(--s1);border:1px solid var(--border2);border-radius:14px;padding:28px;width:480px;max-width:92vw;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.import-file-list{display:flex;flex-direction:column;gap:8px;max-height:240px;overflow-y:auto;margin:16px 0}
.import-file-item{display:flex;align-items:center;gap:10px;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.import-file-name{flex:1;font-size:13px;font-family:var(--mono);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.import-file-type{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:5px;background:rgba(108,142,255,.15);color:var(--acc)}
.import-file-size{font-size:11px;color:var(--dim)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:14px;padding:28px;width:400px;max-width:90vw;box-shadow:0 24px 64px rgba(0,0,0,.6);transform:translateY(16px);transition:transform .25s;animation:none}
.modal-bg.open .modal{transform:translateY(0)}
.modal h3{font-size:17px;font-weight:600;margin-bottom:6px}
.modal p{font-size:13px;color:var(--dim2);line-height:1.6;margin-bottom:20px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-btn{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;transition:all .15s}
.modal-cancel{background:var(--s3);color:var(--dim2)}
.modal-cancel:hover{background:var(--s4);color:var(--text)}
.modal-confirm{background:var(--red);color:#fff}
.modal-confirm:hover{opacity:.85}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    Nyx Builder
  </div>
  <div class="domain-wrap">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--dim);flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    <input class="domain-input" id="domain-input" type="text" placeholder="mysite" spellcheck="false" autocomplete="off">
    <span class="domain-tld">.nyx</span>
  </div>
  <div class="topbar-actions">
    <button class="tb-btn tb-btn-ghost" id="btn-import" title="Import HTML file">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Import
    </button>
    <button class="tb-btn tb-btn-ghost" id="btn-preview-toggle">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      Preview
    </button>
    <button class="tb-btn tb-btn-acc" id="btn-save">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save
    </button>
    <button class="tb-btn tb-btn-green" id="btn-launch">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Launch
    </button>
  </div>
  <input type="file" id="file-import-input" accept=".html,.htm,.css" multiple style="display:none">
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="stab active" data-tab="blocks">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Blocks
      </button>
      <button class="stab" data-tab="props">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M20 12h2M2 12h2M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41"/></svg>
        Style
      </button>
      <button class="stab" data-tab="sites">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Sites
        <span class="badge" id="sites-badge">0</span>
      </button>
    </div>
    <div class="sidebar-body" id="sidebar-body"></div>
  </div>

  <div class="editor-wrap">
    <div class="editor-tabs">
      <div class="etab active" data-etab="html">HTML</div>
      <div class="etab" data-etab="css">CSS</div>
      <div class="etab" data-etab="js">JS</div>
      <div class="editor-actions">
        <button class="ea-btn" id="btn-format" title="Format code">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg>
        </button>
        <button class="ea-btn" id="btn-clear-editor" title="Clear">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>
    <div class="editor-panes">
      <div class="code-pane" id="code-pane">
        <div class="code-row">
          <div class="line-nums" id="line-nums">1</div>
          <textarea class="code" id="code-editor" spellcheck="false" autocomplete="off" autocorrect="off"></textarea>
        </div>
      </div>
      <div class="preview-pane hidden" id="preview-pane">
        <div class="preview-bar">
          <div class="preview-dot"></div>
          <span id="preview-url">preview</span>
          <button class="ea-btn" id="btn-refresh-preview" style="margin-left:auto" title="Refresh preview">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
        <iframe class="preview-frame" id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-text"></span></div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">Delete site</h3>
    <p id="modal-desc">Are you sure?</p>
    <div class="modal-actions">
      <button class="modal-btn modal-cancel" id="modal-cancel">Cancel</button>
      <button class="modal-btn modal-confirm" id="modal-confirm">Delete</button>
    </div>
  </div>
</div>

<script>
const BLOCKS = [
  { id:'hero', label:'Hero', ico:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>',
    html:`<section class="hero">\n  <h1>Your headline here</h1>\n  <p>A short description of what you offer.</p>\n  <a href="#" class="btn">Get started</a>\n</section>`,
    css:`.hero{padding:80px 40px;text-align:center;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}\n.hero h1{font-size:clamp(36px,6vw,72px);font-weight:700;letter-spacing:-2px;line-height:1.1}\n.hero p{font-size:18px;opacity:.7;max-width:480px}\n.btn{padding:14px 32px;background:#6C8EFF;color:#fff;text-decoration:none;border-radius:10px;font-weight:600;transition:opacity .2s,transform .2s}\n.btn:hover{opacity:.85;transform:translateY(-2px)}`},
  { id:'navbar', label:'Navbar', ico:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>',
    html:`<nav class="navbar">\n  <div class="nav-logo">Brand</div>\n  <div class="nav-links">\n    <a href="#">Home</a>\n    <a href="#">About</a>\n    <a href="#">Contact</a>\n  </div>\n</nav>`,
    css:`.navbar{display:flex;align-items:center;justify-content:space-between;padding:16px 40px;background:#111;border-bottom:1px solid rgba(255,255,255,.1)}\n.nav-logo{font-size:18px;font-weight:700;color:#fff}\n.nav-links{display:flex;gap:24px}\n.nav-links a{color:rgba(255,255,255,.6);text-decoration:none;font-size:14px;transition:color .2s}\n.nav-links a:hover{color:#fff}`},
  { id:'cards', label:'Cards', ico:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3l-4 4-4-4"/></svg>',
    html:`<section class="cards-section">\n  <div class="cards">\n    <div class="card"><h3>Feature One</h3><p>Short description of this feature and its benefits.</p></div>\n    <div class="card"><h3>Feature Two</h3><p>Another great feature that makes your product stand out.</p></div>\n    <div class="card"><h3>Feature Three</h3><p>One more powerful capability users will love.</p></div>\n  </div>\n</section>`,
    css:`.cards-section{padding:60px 40px;background:#0e0e14}\n.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;max-width:900px;margin:0 auto}\n.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:28px;transition:border-color .2s,transform .2s}\n.card:hover{border-color:#6C8EFF;transform:translateY(-4px)}\n.card h3{font-size:16px;font-weight:600;color:#fff;margin-bottom:10px}\n.card p{font-size:14px;color:rgba(255,255,255,.5);line-height:1.7}`},
  { id:'text', label:'Text', ico:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>',
    html:`<section class="text-section">\n  <h2>Section Title</h2>\n  <p>Add your content here. This is a paragraph with some text that describes something interesting about your website or product.</p>\n</section>`,
    css:`.text-section{padding:60px 40px;max-width:700px;margin:0 auto;color:#ccc}\n.text-section h2{font-size:32px;font-weight:700;color:#fff;margin-bottom:16px;letter-spacing:-1px}\n.text-section p{font-size:16px;line-height:1.8;opacity:.7}`},
  { id:'footer', label:'Footer', ico:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/></svg>',
    html:`<footer class="footer">\n  <p>&copy; 2025 Your Site. All rights reserved.</p>\n</footer>`,
    css:`.footer{padding:28px 40px;background:#080808;color:rgba(255,255,255,.3);font-size:13px;text-align:center;border-top:1px solid rgba(255,255,255,.06)}`},
  { id:'form', label:'Form', ico:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
    html:`<section class="form-section">\n  <h2>Get in touch</h2>\n  <form class="contact-form">\n    <input type="text" placeholder="Your name">\n    <input type="email" placeholder="Email address">\n    <textarea placeholder="Your message" rows="4"></textarea>\n    <button type="submit">Send message</button>\n  </form>\n</section>`,
    css:`.form-section{padding:60px 40px;background:#0e0e14;color:#fff}\n.form-section h2{font-size:28px;font-weight:700;margin-bottom:24px;letter-spacing:-1px}\n.contact-form{display:flex;flex-direction:column;gap:12px;max-width:480px}\n.contact-form input,.contact-form textarea{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#fff;border-radius:8px;padding:12px 16px;font-family:inherit;font-size:14px;outline:none;transition:border-color .2s}\n.contact-form input:focus,.contact-form textarea:focus{border-color:#6C8EFF}\n.contact-form button{padding:13px;background:#6C8EFF;color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}\n.contact-form button:hover{opacity:.85}`},
];

const STYLE_PRESETS = [
  {name:'Dark',bg:'#0e0e14',text:'#D0D2DC',acc:'#6C8EFF'},
  {name:'Light',bg:'#F8F9FC',text:'#1C1E2A',acc:'#3B5BDB'},
  {name:'Green',bg:'#0A130E',text:'#A8D5B5',acc:'#34D399'},
  {name:'Red',bg:'#12080A',text:'#DBBDBD',acc:'#F87171'},
  {name:'Purple',bg:'#0D0B14',text:'#CCC0E8',acc:'#A78BFA'},
];

let code = { html:'', css:'', js:'' };
let activeEditorTab = 'html';
let previewVisible = false;
let sites = {};
let deletePendingHost = null;

const domainInput  = document.getElementById('domain-input');
const codeEditor   = document.getElementById('code-editor');
const lineNums     = document.getElementById('line-nums');
const previewFrame = document.getElementById('preview-frame');
const previewPane  = document.getElementById('preview-pane');
const codePane     = document.getElementById('code-pane');
const sidebarBody  = document.getElementById('sidebar-body');
const toast        = document.getElementById('toast');
const toastText    = document.getElementById('toast-text');
const previewUrl   = document.getElementById('preview-url');

let toastTimer;
function showToast(msg, type=''){
  clearTimeout(toastTimer);
  toastText.textContent = msg;
  toast.className = 'toast show ' + type;
  toastTimer = setTimeout(()=>toast.classList.remove('show'), 2400);
}

function loadSites(){
  try{ sites = JSON.parse(localStorage.getItem('nyx_vsites')||'{}'); }
  catch{ sites = {}; }
  document.getElementById('sites-badge').textContent = Object.keys(sites).length;
}
loadSites();

function assembleFull(){
  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${domainInput.value||'untitled'}.nyx</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif}
${code.css}
</style>
</head>
<body>
${code.html}
${code.js ? `<script>\n${code.js}\n<\/script>` : ''}
</body>
</html>`;
}

function updatePreview(){
  const html = assembleFull();
  previewFrame.srcdoc = html;
  const d = domainInput.value.trim();
  previewUrl.textContent = d ? d+'.nyx' : 'preview';
}

function updateLineNums(){
  const lines = codeEditor.value.split('\n').length;
  lineNums.textContent = Array.from({length:lines},(_,i)=>i+1).join('\n');
}

codeEditor.addEventListener('input',()=>{
  code[activeEditorTab] = codeEditor.value;
  updateLineNums();
  if(previewVisible) updatePreview();
});

codeEditor.addEventListener('scroll',()=>{
  lineNums.scrollTop = codeEditor.scrollTop;
});

codeEditor.addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=codeEditor.selectionStart, end=codeEditor.selectionEnd;
    codeEditor.value=codeEditor.value.slice(0,s)+'  '+codeEditor.value.slice(end);
    codeEditor.selectionStart=codeEditor.selectionEnd=s+2;
    code[activeEditorTab]=codeEditor.value;
    updateLineNums();
  }
});

document.querySelectorAll('.etab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.etab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    activeEditorTab = tab.dataset.etab;
    codeEditor.value = code[activeEditorTab];
    updateLineNums();
  });
});

document.querySelectorAll('.stab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    renderSidebar(tab.dataset.tab);
  });
});

function renderSidebar(tab){
  if(tab==='blocks') renderBlocks();
  else if(tab==='props') renderProps();
  else if(tab==='sites') renderSites();
}
renderSidebar('blocks');

function renderBlocks(){
  sidebarBody.innerHTML=`
    <div class="section-label">Page blocks</div>
    <div class="block-grid" id="block-grid"></div>
    <div class="section-label">Quick start</div>
  `;
  const grid = document.getElementById('block-grid');
  BLOCKS.forEach(b=>{
    const el = document.createElement('div'); el.className='block-item';
    el.innerHTML=`<div class="block-ico">${b.ico}</div><div class="block-label">${b.label}</div>`;
    el.addEventListener('click',()=>{
      code.html += (code.html?'\n\n':'')+b.html;
      code.css  += (code.css?'\n\n':'')+b.css;
      if(activeEditorTab==='html') codeEditor.value=code.html;
      if(activeEditorTab==='css')  codeEditor.value=code.css;
      updateLineNums();
      if(previewVisible) updatePreview();
      showToast(b.label+' block added');
    });
    grid.appendChild(el);
  });

  const qs = document.createElement('div');
  qs.style.cssText='display:flex;flex-direction:column;gap:6px';
  const templates = [
    {name:'Landing page', blocks:['navbar','hero','cards','footer']},
    {name:'Portfolio',    blocks:['navbar','hero','text','footer']},
    {name:'Contact',      blocks:['navbar','text','form','footer']},
  ];
  templates.forEach(t=>{
    const btn = document.createElement('button');
    btn.style.cssText='background:var(--s3);border:1px solid var(--border2);color:var(--dim2);border-radius:8px;padding:10px 12px;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;text-align:left;transition:background .15s,color .15s;display:flex;align-items:center;gap:8px';
    btn.innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>${t.name}`;
    btn.addEventListener('mouseenter',()=>{btn.style.background='var(--s4)';btn.style.color='var(--text)'});
    btn.addEventListener('mouseleave',()=>{btn.style.background='var(--s3)';btn.style.color='var(--dim2)'});
    btn.addEventListener('click',()=>{
      code={html:'',css:'',js:''};
      t.blocks.forEach(bid=>{ const b=BLOCKS.find(x=>x.id===bid); if(b){code.html+=(code.html?'\n\n':'')+b.html; code.css+=(code.css?'\n\n':'')+b.css;} });
      codeEditor.value=code[activeEditorTab]; updateLineNums();
      if(previewVisible) updatePreview();
      showToast(t.name+' template loaded');
    });
    qs.appendChild(btn);
  });
  sidebarBody.appendChild(qs);
}

function renderProps(){
  sidebarBody.innerHTML='';
  const sl1=document.createElement('div'); sl1.className='section-label'; sl1.textContent='Color presets';
  sidebarBody.appendChild(sl1);
  const swatches=document.createElement('div'); swatches.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px';
  STYLE_PRESETS.forEach(p=>{
    const s=document.createElement('div');
    s.style.cssText=`width:28px;height:28px;border-radius:8px;background:${p.bg};border:2px solid ${p.acc};cursor:pointer;transition:transform .15s`;
    s.title=p.name;
    s.addEventListener('mouseenter',()=>s.style.transform='scale(1.15)');
    s.addEventListener('mouseleave',()=>s.style.transform='scale(1)');
    s.addEventListener('click',()=>{
      const baseCSS=`body{background:${p.bg};color:${p.text}}`;
      code.css = baseCSS + (code.css?'\n'+code.css:'');
      if(activeEditorTab==='css') codeEditor.value=code.css;
      updateLineNums();
      if(previewVisible) updatePreview();
      showToast(p.name+' theme applied');
    });
    swatches.appendChild(s);
  });
  sidebarBody.appendChild(swatches);

  const sl2=document.createElement('div'); sl2.className='section-label'; sl2.textContent='Page meta';
  sidebarBody.appendChild(sl2);

  const rows=[
    {label:'Page title',id:'meta-title',ph:'My Awesome Site'},
    {label:'Description',id:'meta-desc',ph:'A short description...'},
    {label:'Favicon (emoji)',id:'meta-fav',ph:'🌐'},
  ];
  rows.forEach(r=>{
    const row=document.createElement('div'); row.className='prop-row';
    row.innerHTML=`<div class="prop-label">${r.label}</div><input class="prop-input" id="${r.id}" placeholder="${r.ph}" type="text">`;
    sidebarBody.appendChild(row);
  });

  const sl3=document.createElement('div'); sl3.className='section-label'; sl3.textContent='Custom CSS';
  sidebarBody.appendChild(sl3);
  const cssNote=document.createElement('div');
  cssNote.style.cssText='font-size:11px;color:var(--dim);line-height:1.6;margin-bottom:8px';
  cssNote.textContent='Switch to the CSS tab in the editor to write custom styles.';
  sidebarBody.appendChild(cssNote);
}

function renderSites(){
  loadSites();
  sidebarBody.innerHTML='';
  const keys=Object.keys(sites);
  document.getElementById('sites-badge').textContent=keys.length;
  if(!keys.length){
    sidebarBody.innerHTML=`<div class="empty-sites">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="color:var(--dim);opacity:.3"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <div>No sites yet</div>
      <div style="font-size:11px">Build one and click Launch</div>
    </div>`; return;
  }
  keys.forEach((host,i)=>{
    const s=sites[host];
    const d=new Date(s.updated);
    const card=document.createElement('div'); card.className='site-card'; card.style.animationDelay=(i*30)+'ms';
    card.innerHTML=`
      <div class="site-card-head">
        <span class="site-card-domain">${host}</span>
        <div class="site-card-actions">
          <button class="sc-btn edit" title="Edit">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="sc-btn visit" title="Visit">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </button>
          <button class="sc-btn del" title="Delete">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
      <div class="site-card-meta">Updated ${d.toLocaleDateString('en',{month:'short',day:'numeric',year:'numeric'})}</div>
    `;
    card.querySelector('.edit').addEventListener('click',e=>{ e.stopPropagation(); loadSiteIntoEditor(host,s); });
    card.querySelector('.visit').addEventListener('click',e=>{ e.stopPropagation(); parent.postMessage({source:'nyx_builder',type:'navigate',host},'*'); });
    card.querySelector('.del').addEventListener('click',e=>{ e.stopPropagation(); confirmDelete(host); });
    card.addEventListener('click',()=>loadSiteIntoEditor(host,s));
    sidebarBody.appendChild(card);
  });
}

function loadSiteIntoEditor(host, s){
  domainInput.value = host.replace(/\.nyx$/,'');
  code = s.meta?.code || {html:s.html||'',css:'',js:''};
  codeEditor.value = code[activeEditorTab];
  updateLineNums();
  if(previewVisible) updatePreview();
  showToast('Loaded: '+host);
}

function confirmDelete(host){
  deletePendingHost = host;
  document.getElementById('modal-title').textContent = 'Delete "'+host+'"?';
  document.getElementById('modal-desc').textContent = 'This will permanently remove the site from the registry. This action cannot be undone.';
  document.getElementById('modal-bg').classList.add('open');
}
document.getElementById('modal-cancel').addEventListener('click',()=>{ document.getElementById('modal-bg').classList.remove('open'); deletePendingHost=null; });
document.getElementById('modal-confirm').addEventListener('click',()=>{
  if(deletePendingHost){
    parent.postMessage({source:'nyx_builder',type:'delete_site',host:deletePendingHost},'*');
    delete sites[deletePendingHost];
    deletePendingHost=null;
    document.getElementById('modal-bg').classList.remove('open');
    renderSites();
  }
});

document.getElementById('btn-preview-toggle').addEventListener('click',()=>{
  previewVisible=!previewVisible;
  if(previewVisible){ previewPane.classList.remove('hidden'); codePane.classList.remove('hidden'); updatePreview(); }
  else{ previewPane.classList.add('hidden'); }
  document.getElementById('btn-preview-toggle').style.color = previewVisible ? 'var(--acc)' : '';
});

document.getElementById('btn-refresh-preview').addEventListener('click',updatePreview);

document.getElementById('btn-save').addEventListener('click',()=>{
  const d=domainInput.value.trim();
  if(!d){ showToast('Enter a domain name first'); return; }
  const host=d.replace(/\.nyx$/,'')+'.nyx';
  const html=assembleFull();
  parent.postMessage({source:'nyx_builder',type:'register_site',host,html,meta:{code:{...code}}},'*');
  sites[host]={html,meta:{code:{...code}},updated:Date.now()};
  localStorage.setItem('nyx_vsites',JSON.stringify(sites));
  document.getElementById('sites-badge').textContent=Object.keys(sites).length;
  showToast('Saved: '+host,'success');
});

document.getElementById('btn-launch').addEventListener('click',()=>{
  const d=domainInput.value.trim();
  if(!d){ showToast('Enter a domain name first'); return; }
  const host=d.replace(/\.nyx$/,'')+'.nyx';
  const html=assembleFull();
  parent.postMessage({source:'nyx_builder',type:'register_site',host,html,meta:{code:{...code}}},'*');
  sites[host]={html,meta:{code:{...code}},updated:Date.now()};
  localStorage.setItem('nyx_vsites',JSON.stringify(sites));
  setTimeout(()=>{ parent.postMessage({source:'nyx_builder',type:'navigate',host},'*'); }, 200);
  showToast('Launching '+host+'...','success');
});

document.getElementById('btn-clear-editor').addEventListener('click',()=>{
  code[activeEditorTab]=''; codeEditor.value=''; updateLineNums();
  if(previewVisible) updatePreview();
});

document.getElementById('btn-format').addEventListener('click',()=>{
  showToast('Formatted');
});

window.addEventListener('message',e=>{
  if(e.data?.source==='nyx_browser'&&e.data?.type==='sites_list'){
    sites=e.data.sites||{};
    renderSites();
  }
});

parent.postMessage({source:'nyx_builder',type:'get_sites'},'*');
updateLineNums();

const fileInput = document.getElementById('file-import-input');
document.getElementById('btn-import').addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{ if(e.target.files.length) handleImportFiles(Array.from(e.target.files)); fileInput.value=''; });

const dropOverlay = document.createElement('div');
dropOverlay.className = 'drop-overlay';
dropOverlay.innerHTML=`<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><p>Drop files here</p><span>HTML, CSS files supported</span>`;
document.body.appendChild(dropOverlay);

let dragCounter=0;
document.addEventListener('dragenter',e=>{ e.preventDefault(); dragCounter++; if(dragCounter===1) dropOverlay.classList.add('active'); });
document.addEventListener('dragleave',()=>{ dragCounter--; if(dragCounter<=0){ dragCounter=0; dropOverlay.classList.remove('active'); }});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{ e.preventDefault(); dragCounter=0; dropOverlay.classList.remove('active'); const files=Array.from(e.dataTransfer.files).filter(f=>/\.(html|htm|css)$/i.test(f.name)); if(files.length) handleImportFiles(files); });

function fmtSize(n){ if(n<1024) return n+'B'; if(n<1048576) return (n/1024).toFixed(1)+'KB'; return (n/1048576).toFixed(1)+'MB'; }

function handleImportFiles(files){
  const modalBg = document.getElementById('modal-bg');
  const modalEl = modalBg.querySelector('.modal');
  document.getElementById('modal-title').textContent='Import '+files.length+' file'+(files.length>1?'s':'');

  let existingList = modalEl.querySelector('.import-file-list');
  if(existingList) existingList.remove();
  let existingActions = modalEl.querySelector('.modal-actions');
  
  const list=document.createElement('div'); list.className='import-file-list';
  files.forEach(f=>{
    const ext=f.name.split('.').pop().toUpperCase();
    list.innerHTML+=`<div class="import-file-item"><div class="import-file-name">${f.name}</div><span class="import-file-type">${ext}</span><span class="import-file-size">${fmtSize(f.size)}</span></div>`;
  });
  document.getElementById('modal-desc').textContent='These files will be imported into the editor.';
  modalEl.insertBefore(list, existingActions);
  document.getElementById('modal-confirm').textContent='Import';
  document.getElementById('modal-confirm').style.background='var(--acc)';

  modalBg.classList.add('open');

  const doImport = async () => {
    modalBg.classList.remove('open');
    const htmlFiles=files.filter(f=>/\.(html|htm)$/i.test(f.name));
    const cssFiles=files.filter(f=>/\.css$/i.test(f.name));
    if(htmlFiles.length){
      const txt=await htmlFiles[0].text();
      const htmlMatch=txt.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
      const cssMatch=txt.match(/<style[^>]*>([\s\S]*?)<\/style>/i);
      const jsMatch=txt.match(/<script[^>]*>([\s\S]*?)<\/script>/i);
      if(htmlMatch) code.html=htmlMatch[1].trim();
      if(cssMatch)  code.css=cssMatch[1].trim();
      if(jsMatch)   code.js=jsMatch[1].trim();
      if(!htmlMatch){ code.html=txt; }
      const nameGuess=htmlFiles[0].name.replace(/\.(html|htm)$/i,'').replace(/[^a-z0-9-]/gi,'-').toLowerCase();
      if(!domainInput.value) domainInput.value=nameGuess;
    }
    for(const cf of cssFiles){ const txt=await cf.text(); code.css+=(code.css?'':'')+txt; }
    codeEditor.value=code[activeEditorTab];
    updateLineNums();
    if(previewVisible) updatePreview();
    showToast(files.length+' file'+(files.length>1?'s':'')+' imported','success');
    const li=modalEl.querySelector('.import-file-list'); if(li) li.remove();
    document.getElementById('modal-confirm').textContent='Delete';
    document.getElementById('modal-confirm').style.background='';
  };

  const oldConfirm=document.getElementById('modal-confirm').cloneNode(true);
  document.getElementById('modal-confirm').replaceWith(oldConfirm);
  oldConfirm.textContent='Import';
  oldConfirm.style.background='var(--acc)';
  oldConfirm.addEventListener('click',doImport);
  document.getElementById('modal-cancel').onclick=()=>{ modalBg.classList.remove('open'); const li=modalEl.querySelector('.import-file-list'); if(li) li.remove(); oldConfirm.textContent='Delete'; oldConfirm.style.background=''; };
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YYSEC — Security</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080B0A;--s1:#0D1210;--s2:#121A16;--s3:#18211C;--s4:#1E2922;
  --border:rgba(52,211,153,.07);--border2:rgba(52,211,153,.14);
  --text:#B8D4C4;--dim:#3D5C4A;--dim2:#6B9479;
  --acc:#34D399;--acc2:#6EE7B7;--red:#F87171;--yellow:#FBBF24;--blue:#6C8EFF;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
svg{display:block;flex-shrink:0}

.scanline{position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.04) 0px,rgba(0,0,0,.04) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:999}
.glow-top{position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:800px;height:300px;background:radial-gradient(ellipse,rgba(52,211,153,.06) 0%,transparent 70%);pointer-events:none}

.topbar{height:54px;background:var(--s1);border-bottom:1px solid var(--border2);display:flex;align-items:center;padding:0 32px;gap:16px;flex-shrink:0;position:relative;z-index:10}
.logo{display:flex;align-items:center;gap:12px;font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--acc);text-shadow:0 0 20px rgba(52,211,153,.3)}
.logo-shield{width:30px;height:30px;border-radius:8px;background:rgba(52,211,153,.1);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--acc);box-shadow:0 0 8px var(--acc);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
.status-text{font-size:12px;font-weight:500;color:var(--acc);letter-spacing:1px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.threat-level{display:flex;align-items:center;gap:8px;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);font-size:12px;font-weight:600;letter-spacing:.5px}
.threat-level.low{color:var(--acc);border-color:rgba(52,211,153,.3)}
.threat-level.medium{color:var(--yellow);border-color:rgba(251,191,36,.3)}
.threat-level.high{color:var(--red);border-color:rgba(248,113,113,.3)}

.nav-tabs{display:flex;gap:2px;padding:0 32px;background:var(--s1);border-bottom:1px solid var(--border);position:relative;z-index:10}
.nav-tab{padding:12px 18px;font-size:13px;font-weight:500;cursor:pointer;color:var(--dim2);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;display:flex;align-items:center;gap:8px;border:none;background:none;font-family:var(--font);letter-spacing:.2px}
.nav-tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.nav-tab:hover:not(.active){color:var(--text)}

.content{flex:1;padding:28px 32px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--s4) transparent}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}

.tab-panel{display:none}
.tab-panel.active{display:block}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
.stat-box{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:18px;transition:border-color .2s}
.stat-box:hover{border-color:var(--border2)}
.stat-box-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim2);margin-bottom:8px}
.stat-box-val{font-size:28px;font-weight:700;letter-spacing:-1px;color:var(--text)}
.stat-box-sub{font-size:11px;color:var(--dim2);margin-top:3px}

.section-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim2);margin-bottom:12px;margin-top:24px}

.firewall-status{background:var(--s1);border:1px solid var(--border2);border-radius:12px;padding:20px;display:flex;align-items:center;gap:16px;margin-bottom:20px}
.fw-icon{width:44px;height:44px;border-radius:10px;background:rgba(52,211,153,.1);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fw-info{flex:1}
.fw-title{font-size:14px;font-weight:600}
.fw-sub{font-size:12px;color:var(--dim2);margin-top:3px}
.toggle{width:44px;height:24px;background:var(--s4);border-radius:12px;position:relative;cursor:pointer;border:none;flex-shrink:0;transition:background .2s}
.toggle.on{background:var(--acc)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle.on::after{transform:translateX(20px)}

.rule-input-row{display:flex;gap:8px;margin-bottom:16px}
.rule-input{flex:1;background:var(--s2);border:1.5px solid var(--border2);color:var(--text);border-radius:8px;padding:9px 14px;font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s}
.rule-input:focus{border-color:var(--acc)}
.rule-input::placeholder{color:var(--dim);font-family:var(--font);font-size:13px}
.add-btn{padding:9px 18px;background:rgba(52,211,153,.12);color:var(--acc);border:1px solid var(--border2);border-radius:8px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;transition:background .15s,border-color .15s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.add-btn:hover{background:rgba(52,211,153,.2);border-color:var(--acc)}

.rules-list{display:flex;flex-direction:column;gap:4px}
.rule-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--s2);border:1px solid var(--border);border-radius:8px;animation:slideIn .18s ease both}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
.rule-pattern{flex:1;font-family:var(--mono);font-size:13px;color:var(--text)}
.rule-type{font-size:10px;font-weight:600;letter-spacing:1px;padding:2px 7px;border-radius:4px}
.rule-type.exact{background:rgba(248,113,113,.12);color:var(--red)}
.rule-type.wildcard{background:rgba(251,191,36,.12);color:var(--yellow)}
.rule-del{width:24px;height:24px;border:none;background:none;cursor:pointer;color:var(--dim);border-radius:5px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;flex-shrink:0}
.rule-del:hover{background:rgba(248,113,113,.15);color:var(--red)}

.log-filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.log-filter-btn{padding:4px 12px;border-radius:16px;border:1px solid var(--border2);background:none;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:500;color:var(--dim2);transition:all .15s}
.log-filter-btn.active{background:rgba(52,211,153,.12);color:var(--acc);border-color:rgba(52,211,153,.3)}

.log-list{display:flex;flex-direction:column;gap:3px}
.log-row{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--s1);border:1px solid var(--border);border-radius:8px;animation:slideIn .15s ease both}
.log-row.blocked{background:rgba(248,113,113,.04);border-color:rgba(248,113,113,.12)}
.log-host{flex:1;font-family:var(--mono);font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-action{font-size:10px;font-weight:600;letter-spacing:.8px;padding:2px 8px;border-radius:4px}
.log-action.allowed{background:rgba(52,211,153,.1);color:var(--acc)}
.log-action.blocked{background:rgba(248,113,113,.12);color:var(--red)}
.log-time{font-size:11px;color:var(--dim2);white-space:nowrap;font-family:var(--mono)}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--dim2);font-size:13px;text-align:center}
.empty svg{opacity:.25}

.action-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.sec-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border2);background:var(--s2);cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;color:var(--dim2);transition:all .15s;display:flex;align-items:center;gap:6px}
.sec-btn:hover{background:var(--s3);color:var(--text)}
.sec-btn.danger:hover{background:rgba(248,113,113,.1);color:var(--red);border-color:rgba(248,113,113,.3)}
</style>
</head>
<body>

<div class="scanline"></div>
<div class="glow-top"></div>

<div class="topbar">
  <div class="logo">
    <div class="logo-shield">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    YYSEC
  </div>
  <div class="status-dot"></div>
  <span class="status-text">SYSTEM ACTIVE</span>
  <div class="tb-right">
    <div class="threat-level low" id="threat-level">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span id="threat-text">LOW RISK</span>
    </div>
  </div>
</div>

<div class="nav-tabs">
  <button class="nav-tab active" data-tab="overview">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Overview
  </button>
  <button class="nav-tab" data-tab="firewall">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Firewall
  </button>
  <button class="nav-tab" data-tab="auditlog">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Audit Log
  </button>
</div>

<div class="content">
  <!-- OVERVIEW -->
  <div class="tab-panel active" id="panel-overview">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="section-label">Recent Blocked Requests</div>
    <div id="recent-blocked"></div>
    <div class="section-label" style="margin-top:20px">Quick Actions</div>
    <div class="action-bar">
      <button class="sec-btn" id="btn-goto-registry">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Open Registry
      </button>
      <button class="sec-btn" id="btn-goto-builder">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Open Builder
      </button>
      <button class="sec-btn danger" id="btn-clear-log-ov">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
        Clear Log
      </button>
    </div>
  </div>

  <!-- FIREWALL -->
  <div class="tab-panel" id="panel-firewall">
    <div class="firewall-status">
      <div class="fw-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--acc)"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <div class="fw-info">
        <div class="fw-title">Nyx Firewall</div>
        <div class="fw-sub" id="fw-sub-text">Active — all navigation requests are filtered</div>
      </div>
      <button class="toggle on" id="fw-toggle"></button>
    </div>

    <div class="section-label">Block Rules</div>
    <div class="rule-input-row">
      <input class="rule-input" id="rule-input" type="text" placeholder="domain.com or *.domain.com for wildcard">
      <button class="add-btn" id="btn-add-rule">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Rule
      </button>
    </div>
    <div class="rules-list" id="rules-list"></div>

    <div class="section-label" style="margin-top:24px">Presets</div>
    <div class="action-bar">
      <button class="sec-btn" data-preset="ads">Block Ad Networks</button>
      <button class="sec-btn" data-preset="trackers">Block Trackers</button>
      <button class="sec-btn danger" id="btn-clear-rules">Clear All Rules</button>
    </div>
  </div>

  <!-- AUDIT LOG -->
  <div class="tab-panel" id="panel-auditlog">
    <div class="action-bar">
      <button class="sec-btn danger" id="btn-clear-log">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
        Clear Log
      </button>
    </div>
    <div class="log-filters" id="log-filters">
      <button class="log-filter-btn active" data-lf="all">All</button>
      <button class="log-filter-btn" data-lf="allowed">Allowed</button>
      <button class="log-filter-btn" data-lf="blocked">Blocked</button>
    </div>
    <div class="log-list" id="log-list"></div>
  </div>
</div>

<script>
let data = { blocklist:[], auditlog:[], sites:{}, history:[] };
let fwEnabled = true;
let logFilter = 'all';
const PRESETS = {
  ads:['ads.com','doubleclick.net','googlesyndication.com','adservice.google.com','*.ads.net'],
  trackers:['analytics.google.com','hotjar.com','mixpanel.com','segment.com','*.tracking.com'],
};

function fmtTime(ts){ const d=new Date(ts); return d.toLocaleDateString('en',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}); }

function renderStats(){
  const total=data.auditlog.length;
  const blocked=data.auditlog.filter(l=>l.blocked).length;
  const allowed=total-blocked;
  const rules=data.blocklist.length;
  const threat=blocked>20?'high':blocked>5?'medium':'low';
  const threatLabels={low:'LOW RISK',medium:'MEDIUM',high:'HIGH RISK'};
  const tl=document.getElementById('threat-level');
  tl.className='threat-level '+threat;
  document.getElementById('threat-text').textContent=threatLabels[threat];

  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-box"><div class="stat-box-label">Total Requests</div><div class="stat-box-val">${total}</div><div class="stat-box-sub">all navigation</div></div>
    <div class="stat-box"><div class="stat-box-label">Blocked</div><div class="stat-box-val" style="color:var(--red)">${blocked}</div><div class="stat-box-sub">by firewall</div></div>
    <div class="stat-box"><div class="stat-box-label">Allowed</div><div class="stat-box-val" style="color:var(--acc)">${allowed}</div><div class="stat-box-sub">passed through</div></div>
    <div class="stat-box"><div class="stat-box-label">Block Rules</div><div class="stat-box-val" style="color:var(--yellow)">${rules}</div><div class="stat-box-sub">active rules</div></div>
  `;

  const recentBlocked=data.auditlog.filter(l=>l.blocked).slice(0,5);
  const rb=document.getElementById('recent-blocked');
  if(!recentBlocked.length){ rb.innerHTML=`<div class="empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>No blocked requests yet</div>`; }
  else{ rb.innerHTML='<div class="log-list">'+recentBlocked.map(l=>`<div class="log-row blocked"><span class="log-host">${l.host}</span><span class="log-action blocked">BLOCKED</span><span class="log-time">${fmtTime(l.time)}</span></div>`).join('')+'</div>'; }
}

function renderRules(){
  const list=document.getElementById('rules-list');
  if(!data.blocklist.length){ list.innerHTML=`<div class="empty" style="padding:32px"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>No rules yet — add one above</div>`; return; }
  list.innerHTML=data.blocklist.map((r,i)=>`
    <div class="rule-row" style="animation-delay:${i*15}ms">
      <span class="rule-pattern">${r}</span>
      <span class="rule-type ${r.startsWith('*.')?'wildcard':'exact'}">${r.startsWith('*.')?'WILDCARD':'EXACT'}</span>
      <button class="rule-del" data-idx="${i}">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`).join('');
  document.querySelectorAll('.rule-del').forEach(btn=>{
    btn.addEventListener('click',()=>{ data.blocklist.splice(parseInt(btn.dataset.idx),1); syncBlocklist(); renderRules(); renderStats(); });
  });
}

function renderLog(){
  const entries=logFilter==='all'?data.auditlog:data.auditlog.filter(l=>logFilter==='blocked'?l.blocked:!l.blocked);
  const list=document.getElementById('log-list');
  if(!entries.length){ list.innerHTML=`<div class="empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>No log entries</div>`; return; }
  list.innerHTML=entries.slice(0,150).map((l,i)=>`
    <div class="log-row ${l.blocked?'blocked':''}" style="animation-delay:${Math.min(i,30)*10}ms">
      <span class="log-host">${l.host}</span>
      <span class="log-action ${l.blocked?'blocked':'allowed'}">${l.blocked?'BLOCKED':'ALLOWED'}</span>
      <span class="log-time">${fmtTime(l.time)}</span>
    </div>`).join('');
}

function syncBlocklist(){ parent.postMessage({source:'nyx_yysec',type:'set_blocklist',blocklist:data.blocklist},'*'); }

function addRule(rule){
  rule=rule.trim().toLowerCase();
  if(!rule||data.blocklist.includes(rule)) return false;
  data.blocklist.push(rule);
  syncBlocklist();
  renderRules();
  renderStats();
  return true;
}

document.getElementById('btn-add-rule').addEventListener('click',()=>{
  const v=document.getElementById('rule-input').value.trim();
  if(addRule(v)){ document.getElementById('rule-input').value=''; }
});
document.getElementById('rule-input').addEventListener('keydown',e=>{ if(e.key==='Enter'){ const v=e.target.value.trim(); if(addRule(v)) e.target.value=''; }});
document.getElementById('btn-clear-rules').addEventListener('click',()=>{ if(confirm('Clear all block rules?')){ data.blocklist=[]; syncBlocklist(); renderRules(); renderStats(); }});
document.getElementById('fw-toggle').addEventListener('click',function(){ fwEnabled=!fwEnabled; this.classList.toggle('on',fwEnabled); document.getElementById('fw-sub-text').textContent=fwEnabled?'Active — all navigation requests are filtered':'Disabled — all requests are allowed through'; });

document.querySelectorAll('[data-preset]').forEach(btn=>{
  btn.addEventListener('click',()=>{ const rules=PRESETS[btn.dataset.preset]||[]; rules.forEach(r=>addRule(r)); });
});

const clearLog=()=>{ parent.postMessage({source:'nyx_yysec',type:'clear_auditlog'},'*'); data.auditlog=[]; renderLog(); renderStats(); };
document.getElementById('btn-clear-log').addEventListener('click',clearLog);
document.getElementById('btn-clear-log-ov').addEventListener('click',clearLog);
document.getElementById('btn-goto-registry').addEventListener('click',()=>parent.postMessage({source:'nyx_yysec',type:'navigate',host:'registry.nyx'},'*'));
document.getElementById('btn-goto-builder').addEventListener('click',()=>parent.postMessage({source:'nyx_yysec',type:'navigate',host:'builder.nyx'},'*'));

document.querySelectorAll('.nav-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.tab).classList.add('active');
    if(tab.dataset.tab==='auditlog') renderLog();
    if(tab.dataset.tab==='firewall') renderRules();
  });
});

document.querySelectorAll('.log-filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{ document.querySelectorAll('.log-filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); logFilter=btn.dataset.lf; renderLog(); });
});

window.addEventListener('message',e=>{
  const d=e.data; if(!d||d.source!=='nyx_browser') return;
  if(d.type==='security_data'){ data={blocklist:d.blocklist||[],auditlog:d.auditlog||[],sites:d.sites||{},history:d.history||[]}; renderStats(); renderRules(); renderLog(); }
});

parent.postMessage({source:'nyx_yysec',type:'get_data'},'*');
